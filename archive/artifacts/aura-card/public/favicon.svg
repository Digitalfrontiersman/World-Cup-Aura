<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="180" height="180" rx="36" fill="#050816"/>

  <!-- Outer gold glow ring -->
  <circle cx="90" cy="90" r="76" fill="url(#outerGlow)" opacity="0.35"/>

  <!-- Mid gold ring -->
  <circle cx="90" cy="90" r="58" fill="url(#midGlow)" opacity="0.55"/>

  <!-- Core gold orb -->
  <circle cx="90" cy="90" r="42" fill="url(#coreGrad)"/>

  <!-- Blue accent ring (secondary) -->
  <circle cx="90" cy="90" r="50" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.3"/>

  <!-- Inner highlight -->
  <circle cx="76" cy="74" r="13" fill="url(#highlight)" opacity="0.5"/>

  <defs>
    <radialGradient id="outerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="55%" stop-color="#f59e0b" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#050816" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="midGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="45%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#92400e" stop-opacity="0.2"/>
    </radialGradient>

    <radialGradient id="coreGrad" cx="40%" cy="36%" r="60%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="30%" stop-color="#fbbf24"/>
      <stop offset="70%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#78350f"/>
    </radialGradient>

    <radialGradient id="highlight" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
