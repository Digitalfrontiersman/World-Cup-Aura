openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: aura
    description: Aura Card minting operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /aura/card:
    post:
      operationId: saveAuraCard
      tags: [aura]
      summary: Save a generated Aura Card and get a shareable slug
      description: >
        Persists the rendered card image and metadata. Returns a short UUID slug
        that can be used to construct a shareable URL (/card/<slug>) where
        recipients see the actual card. Also returns the server-assigned rarity
        tier and global edition number from the 100k print run.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveCardInput"
      responses:
        "200":
          description: Card saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaveCardResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /aura/card/{slug}/image:
    patch:
      operationId: updateAuraCardImage
      tags: [aura]
      summary: Update the stored card image after rarity and edition are known
      description: >
        Replaces the imageDataUrl for a previously saved card. Called by the
        client after the server-assigned rarity and edition number have been
        flushed to the DOM and a second, corrected capture has been taken.
        This ensures the community wall shows the definitive card image
        (with correct rarity badge and edition stamp).
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCardImageInput"
      responses:
        "200":
          description: Image updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateCardImageResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Card not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /aura/card/{slug}:
    get:
      operationId: getAuraCard
      tags: [aura]
      summary: Retrieve a saved Aura Card by slug
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Card data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CardPreviewData"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /aura/cards:
    get:
      operationId: listAuraCards
      tags: [aura]
      summary: List recently generated Aura Cards
      description: >
        Returns the most recent 50 Aura Cards, newest first. Used to power the
        community card wall shown below the result screen.
      responses:
        "200":
          description: Card list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityCardList"
  /aura/cards/{slug}/vote:
    post:
      operationId: voteAuraCard
      tags: [aura]
      summary: Cast or change a vote on a community card
      description: >
        Upserts a +1 or -1 vote for the given session. Returns the updated net
        vote score. One vote per session per card - submitting again replaces
        the previous vote.
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CardVoteInput"
      responses:
        "200":
          description: Vote recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CardVoteResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Card not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /aura/cards/{slug}/comments:
    get:
      operationId: listCardComments
      tags: [aura]
      summary: List comments for a community card
      description: Returns all comments for the given card, newest first.
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Comment list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CardCommentList"
        "404":
          description: Card not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    post:
      operationId: postCardComment
      tags: [aura]
      summary: Post a comment on a community card
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CardCommentInput"
      responses:
        "200":
          description: Comment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CardComment"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Card not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /aura/rarity-stats:
    get:
      operationId: getRarityStats
      tags: [aura]
      summary: Live rarity tier statistics for the 100k edition print run
      description: >
        Returns issued and remaining counts per rarity tier across the full
        100,000-card edition. Used to power the landing page "The Collection"
        modal and the community wall counter.
      responses:
        "200":
          description: Rarity stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RarityStats"
  /aura/mint-status:
    get:
      operationId: getMintStatus
      tags: [aura]
      summary: Sponsored mint availability
      description: >
        Reports whether the server-side sponsor (treasury) wallet is configured
        and funded enough to sponsor Aura Card NFT mints on Solana devnet.
      responses:
        "200":
          description: Mint status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MintStatus"
  /aura/mint:
    post:
      operationId: mintAuraCard
      tags: [aura]
      summary: Sponsor-mint an Aura Card NFT
      description: >
        Mints the rendered Aura Card as an NFT on Solana devnet directly to the
        provided recipient wallet address. All fees are paid by the server-side
        treasury wallet, so the user needs no wallet balance of their own.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MintInput"
      responses:
        "200":
          description: Minted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MintCardResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "503":
          description: Minting unavailable (treasury not configured or unfunded)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    MintStatus:
      type: object
      properties:
        configured:
          type: boolean
          description: True when a treasury sponsor wallet is configured on the server.
        ready:
          type: boolean
          description: True when the treasury is configured AND funded enough to sponsor a mint.
        treasuryAddress:
          type: ["string", "null"]
          description: The sponsor wallet address (so it can be funded), or null when unconfigured.
        balanceSol:
          type: ["number", "null"]
          description: Current treasury balance in SOL, or null when unconfigured/unreachable.
      required:
        - configured
        - ready
        - treasuryAddress
        - balanceSol
    AuraStats:
      type: object
      properties:
        speed: { type: integer }
        clutch: { type: integer }
        iq: { type: integer }
        chaos: { type: integer }
        loyalty: { type: integer }
        banter: { type: integer }
      required: [speed, clutch, iq, chaos, loyalty, banter]
    AuraCardMeta:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        nation: { type: string }
        aura: { type: integer }
        power: { type: integer }
        rank: { type: string }
        rarity: { type: string }
        archetype: { type: string }
        prophecy: { type: string }
        stats:
          $ref: "#/components/schemas/AuraStats"
      required:
        - id
        - name
        - nation
        - aura
        - power
        - rank
        - rarity
        - archetype
        - prophecy
        - stats
    MintInput:
      type: object
      properties:
        image:
          type: string
          description: The rendered card as a PNG/JPEG/WebP data URL.
        recipient:
          type: string
          description: Base58 Solana wallet address that will own the minted NFT.
          minLength: 32
          maxLength: 44
        card:
          $ref: "#/components/schemas/AuraCardMeta"
      required:
        - image
        - recipient
        - card
    SaveCardInput:
      type: object
      properties:
        card:
          $ref: "#/components/schemas/AuraCardMeta"
        imageDataUrl:
          type: string
          description: The rendered card as a PNG data URL.
        vrfSlug:
          type: string
          description: >
            Opaque server-issued token returned by POST /aura/transform.
            When present the server retrieves its pre-computed VRF state
            (blockhash, seed, archetype, stat deltas) and the pre-fired
            Solana Memo promise, so rarity and card values are fully
            server-authoritative and on-chain verifiable.
      required:
        - card
        - imageDataUrl
    SaveCardResult:
      type: object
      properties:
        slug:
          type: string
          description: UUID slug for the shareable card URL.
        rarity:
          type: string
          description: Server-assigned rarity tier from the weighted print-run draw.
        editionNumber:
          type: integer
          description: Global sequential edition number (1-100,000).
        vrfTxSig:
          type: ["string", "null"]
          description: >
            Solana transaction signature for the on-chain VRF commitment Memo,
            or null when VRF data was not provided or the treasury is unconfigured.
      required:
        - slug
        - rarity
        - editionNumber
        - vrfTxSig
    CardPreviewData:
      type: object
      properties:
        card:
          $ref: "#/components/schemas/AuraCardMeta"
        imageDataUrl:
          type: string
        vrfTxSig:
          type: ["string", "null"]
          description: >
            Solana transaction signature for the on-chain VRF commitment Memo,
            or null when unavailable.
      required:
        - card
        - imageDataUrl
        - vrfTxSig
    CommunityCard:
      type: object
      properties:
        slug:
          type: string
        name:
          type: string
        nation:
          type: string
        rarity:
          type: string
        archetype:
          type: string
        imageUrl:
          type: string
          nullable: true
          description: >
            URL path to the card image (e.g. /api/aura/card/{slug}/image).
            Null when no portrait has been stored for this card.
        editionNumber:
          type: integer
          description: Global sequential edition number (1-100,000).
        voteScore:
          type: integer
          description: Net vote score (upvotes minus downvotes).
        commentCount:
          type: integer
          description: Total number of comments on this card.
        vrfTxSig:
          type: string
          nullable: true
          description: >
            Solana transaction signature for the on-chain VRF commitment Memo,
            or null when VRF data is not available for this card.
      required:
        - slug
        - name
        - nation
        - rarity
        - archetype
        - imageUrl
        - editionNumber
        - voteScore
        - commentCount
        - vrfTxSig
    UpdateCardImageInput:
      type: object
      properties:
        imageDataUrl:
          type: string
          description: The final rendered card PNG data URL (with rarity badge and edition stamp).
      required:
        - imageDataUrl
    UpdateCardImageResult:
      type: object
      properties:
        ok:
          type: boolean
      required:
        - ok
    CardVoteInput:
      type: object
      properties:
        vote:
          type: integer
          description: +1 for thumbs up, -1 for thumbs down.
          enum: [1, -1]
        sessionId:
          type: string
          description: Persistent browser session ID for deduplication.
      required: [vote, sessionId]
    CardVoteResult:
      type: object
      properties:
        voteScore:
          type: integer
          description: Updated net vote score for this card.
        userVote:
          type: ["integer", "null"]
          description: The current session's vote (+1, -1, or null if none).
      required: [voteScore, userVote]
    CardComment:
      type: object
      properties:
        id:
          type: integer
        displayName:
          type: string
        body:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, displayName, body, createdAt]
    CardCommentInput:
      type: object
      properties:
        displayName:
          type: string
          description: Optional display name; defaults to "Anonymous".
          maxLength: 50
        body:
          type: string
          description: Comment text, max 280 characters.
          maxLength: 280
      required: [body]
    CardCommentList:
      type: object
      properties:
        comments:
          type: array
          items:
            $ref: "#/components/schemas/CardComment"
      required: [comments]
    CommunityCardList:
      type: object
      properties:
        cards:
          type: array
          items:
            $ref: "#/components/schemas/CommunityCard"
        totalIssued:
          type: integer
          description: Total number of Aura Cards issued so far.
      required:
        - cards
        - totalIssued
    MintCardResult:
      type: object
      properties:
        mintAddress:
          type: string
        explorerUrl:
          type: string
        recipient:
          type: string
      required:
        - mintAddress
        - explorerUrl
        - recipient
    RarityTierStat:
      type: object
      properties:
        tier:
          type: string
          description: Rarity tier name (Core, Rising, Elite, Icon, Legendary, Mythic).
        quota:
          type: integer
          description: Total cards allocated to this tier in the 100k print run.
        issued:
          type: integer
          description: Cards issued in this tier so far.
        remaining:
          type: integer
          description: Cards remaining in this tier.
        pullRate:
          type: number
          description: Pull probability as a percentage (e.g. 55.0 for 55%).
      required:
        - tier
        - quota
        - issued
        - remaining
        - pullRate
    RarityStats:
      type: object
      properties:
        tiers:
          type: array
          items:
            $ref: "#/components/schemas/RarityTierStat"
        totalIssued:
          type: integer
          description: Total Aura Cards issued across all tiers.
        totalQuota:
          type: integer
          description: Total edition size (100,000).
      required:
        - tiers
        - totalIssued
        - totalQuota
