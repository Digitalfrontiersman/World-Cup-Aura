kind = "web"
previewPath = "/"
title = "World Cup Aura Card"
version = "1.0.0"
id = "artifacts/aura-card"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20613

[services.development]
run = "pnpm --filter @workspace/aura-card run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/aura-card", "run", "build" ]
publicDir = "artifacts/aura-card/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20613"
BASE_PATH = "/"
