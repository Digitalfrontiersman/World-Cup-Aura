# ============================================================================
# DigitalOcean App Platform spec for World Cup Aura.
#
# One app, two components under ONE domain:
#   - static_site "web" serves the built frontend at  /
#   - service     "api" serves the Express backend at /api
# Because they share an origin, the frontend's same-origin `/api/*` calls just
# work (no cross-origin CORS needed).
#
# The database is NOT part of this app: it stays on Neon. You only supply the
# Neon connection string as the DATABASE_URL secret below. Nothing about the
# data changes.
#
# Import this file when creating the app:
#   doctl apps create --spec .do/app.yaml
# or in the UI: Create App -> ... -> "Edit your app spec" and paste this.
#
# Secrets are placeholders (REPLACE_IN_DASHBOARD). Set their real values in the
# App Platform dashboard (Settings -> your component -> Environment Variables);
# App Platform stores SECRET-typed values encrypted. Never commit real secrets.
# ============================================================================
name: worldcup-aura

# Singapore, to sit next to the Neon DB in ap-southeast-1 (low query latency).
region: sgp

services:
  - name: api
    dockerfile_path: artifacts/api-server/Dockerfile
    source_dir: /
    github:
      repo: Digitalfrontiersman/World-Cup-Aura
      # NOTE: this deploy config currently lives on the `Bilal` branch. Merge it
      # to `main` before first deploy, or change this to `branch: Bilal`.
      branch: main
      deploy_on_push: true
    http_port: 8080
    instance_size_slug: apps-s-1vcpu-1gb
    instance_count: 1
    health_check:
      # The server mounts its router at /api, so /healthz lives at /api/healthz.
      # (This probe hits the container directly, not through the ingress rules.)
      http_path: /api/healthz
      initial_delay_seconds: 20
      period_seconds: 15
      failure_threshold: 5
    routes:
      - path: /api
        # Keep the /api prefix so Express's app.use("/api", router) matches.
        preserve_path_prefix: true
    envs:
      - key: NODE_ENV
        scope: RUN_TIME
        value: production
      # --- Required ---
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
        value: REPLACE_IN_DASHBOARD # your Neon connection string (?sslmode=require)
      # Only these origins may call money/AI endpoints in production. Add your
      # *.ondigitalocean.app URL too if you test on the default domain.
      - key: CORS_ALLOWED_ORIGINS
        scope: RUN_TIME
        value: https://worldcupaura.com,https://www.worldcupaura.com
      # --- OpenAI (image transform) ---
      - key: OPENAI_API_KEY
        scope: RUN_TIME
        type: SECRET
        value: REPLACE_IN_DASHBOARD
      # --- Solana minting (env-var path; there is no writable treasury file here) ---
      - key: SOLANA_TREASURY_SECRET_KEY
        scope: RUN_TIME
        type: SECRET
        value: REPLACE_IN_DASHBOARD # base58 secret key of the treasury wallet
      - key: SOLANA_DEVNET_RPC_URL
        scope: RUN_TIME
        type: SECRET
        value: REPLACE_IN_DASHBOARD # full RPC URL or bare Helius key
      # --- Ziina payments (physical card shipping) ---
      - key: ZIINA_API_KEY
        scope: RUN_TIME
        type: SECRET
        value: REPLACE_IN_DASHBOARD
      - key: ZIINA_TEST_MODE
        scope: RUN_TIME
        value: "true" # set to "false" ONLY when you want to take real payments
      # --- Live World Cup ticker (TxLINE); omit to disable the ticker ---
      - key: TXLINE_API_TOKEN
        scope: RUN_TIME
        type: SECRET
        value: REPLACE_IN_DASHBOARD
      # Rate-limit defaults (5/hr card, 3/hr mint, ...) are built in and tunable
      # via RATE_LIMIT_* env vars with no redeploy — add them here if you want.

static_sites:
  - name: web
    source_dir: /
    github:
      repo: Digitalfrontiersman/World-Cup-Aura
      branch: main
      deploy_on_push: true
    # Build only the frontend + its workspace deps from the monorepo root.
    build_command: >-
      corepack enable &&
      corepack prepare pnpm@10.33.2 --activate &&
      pnpm install --frozen-lockfile --filter "@workspace/aura-card..." &&
      pnpm --filter @workspace/aura-card run build
    output_dir: artifacts/aura-card/dist/public
    index_document: index.html
    # SPA (wouter client-side routing): serve index.html for unknown paths.
    catchall_document: index.html
    routes:
      - path: /
    # VITE_* vars are compiled INTO the bundle, so they are BUILD_TIME.
    envs:
      - key: VITE_APP_URL
        scope: BUILD_TIME
        value: https://worldcupaura.com
      - key: VITE_SOLANA_DEVNET_RPC_URL
        scope: BUILD_TIME
        type: SECRET
        value: REPLACE_IN_DASHBOARD # full Helius devnet RPC URL or bare key
      # --- Analytics (all optional; leave blank to disable that provider) ---
      - key: VITE_GA_MEASUREMENT_ID
        scope: BUILD_TIME
        value: "" # e.g. G-XXXXXXXXXX
      - key: VITE_FB_PIXEL_ID
        scope: BUILD_TIME
        value: ""
      - key: VITE_POSTHOG_API_KEY
        scope: BUILD_TIME
        type: SECRET
        value: "" # optional
      - key: VITE_POSTHOG_HOST
        scope: BUILD_TIME
        value: "" # optional, defaults to https://us.i.posthog.com

# Attach your custom domain here (you must point DNS — see DEPLOY.md).
# Remove this block to launch on the free *.ondigitalocean.app URL first.
domains:
  - domain: worldcupaura.com
    type: PRIMARY
  - domain: www.worldcupaura.com
    type: ALIAS
